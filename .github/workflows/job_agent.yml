name: Job Agent

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job agent
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          CHECK_INTERVAL_MINUTES: 5
        run: python main.py --once

      - name: Commit updated jobs database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f data/jobs.db ]; then
            git add -f data/jobs.db
          fi
          if [ -d resumes ] && [ -n "$(find resumes -type f -print -quit 2>/dev/null)" ]; then
            git add -f resumes/
          fi
          git diff --staged --quiet || git commit -m "chore: update jobs db and resumes [skip ci]"
          git push
